<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
<!-- ============================================================================
     OneBrain icon sprite — Lucide line style (DESIGN.md §6).
     All symbols are geometry-only: viewBox 0 0 24 24, no fill/stroke attrs.
     Presentation (fill:none · stroke:currentColor · stroke-width 1.75 · round
     caps/joins · size) is set ONCE by the .ob-icon class in components.css and
     INHERITS into the <use>d symbol, so one swatch of CSS keys every icon and
     each icon follows the surrounding text/accent color via currentColor.

     Usage (served over http):
       <svg class="ob-icon ob-icon-20"><use href="assets/icons.svg#ob-vault"/></svg>
     For file:// / self-contained docs, inline this whole <svg> block once at the
     top of <body> and reference the same #ids in-document.

     Names use the real OneBrain product vocabulary (vault, skill, harness,
     memory, capture, the co-evolution skills) + the UI affordances the surfaces
     actually use. The 14 skill marks reuse the exact paths already shipped in
     preview/command-palette.js so the palette and the sprite never diverge.
     ============================================================================ -->

