<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OneBrain — Operator Console (UI Kit)</title>

<!-- Design-system tokens + bound brand fonts -->
<link rel="stylesheet" href="../../colors_and_type.css" />

<!-- React + Babel (pinned versions w/ integrity, per design-system charter) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  /* ── Operator-console kit styles — built entirely on colors_and_type.css
     tokens. Component .jsx files reference these class names. ───────────── */
  html, body { height: 100%; }
  body { margin: 0; background: var(--color-bg); color: var(--color-text);
    font-family: var(--font-sans); -webkit-font-smoothing: antialiased; }
  #root { height: 100vh; }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
  *:focus-visible { outline: 2px solid var(--color-accent-2); outline-offset: 2px; }

  .ob-shell { position: relative; display: grid; grid-template-columns: 252px 312px 1fr;
    height: 100vh; overflow: hidden; }
  .ob-grid-bg { position: absolute; inset: 0; z-index: 0; pointer-events: none;
    background-image: linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: var(--grid-size) var(--grid-size);
    -webkit-mask-image: radial-gradient(ellipse 90% 80% at 60% 30%, #000 20%, transparent 100%);
            mask-image: radial-gradient(ellipse 90% 80% at 60% 30%, #000 20%, transparent 100%); }
  /* Lift real regions above the backdrop. Exclude .ob-grid-bg — it must keep
     its own position:absolute (equal-specificity `> *` would otherwise override
     it to relative, making the backdrop an in-flow grid item that eats column 1
     and wraps .ob-main to a second row). */
  .ob-shell > *:not(.ob-grid-bg) { position: relative; z-index: 1; }

  /* ── Sidebar ───────────────────────────────────────────────────────── */
  .ob-sidebar { display: flex; flex-direction: column; background: rgba(2,2,4,.92);
    border-right: 1px solid var(--color-border); padding: 22px 16px; }
  .ob-brand { display: flex; align-items: center; gap: 13px; padding: 4px 6px 22px; }
  .ob-brand-mark { width: 38px; height: 38px; filter: var(--glow-brand); }
  .ob-brand-text { display: flex; flex-direction: column; }
  .ob-brand-name { font-family: var(--font-display); font-style: italic; font-weight: 700;
    text-transform: uppercase; letter-spacing: .01em; font-size: 1.15rem; color: #fff; line-height: 1; }
  .ob-brand-b { background: var(--grad-brand); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .ob-brand-sub { font-family: var(--font-mono); font-size: 8.5px; letter-spacing: .36em;
    color: var(--color-muted); margin-top: 6px; }
  .ob-nav-label { font-family: var(--font-mono); font-size: 9px; letter-spacing: .3em;
    text-transform: uppercase; color: var(--color-ghost); padding: 8px 6px; }
  .ob-folders { display: flex; flex-direction: column; gap: 2px; flex: 1; }
  .ob-folder { display: flex; align-items: center; gap: 12px; padding: 9px 10px; text-align: left;
    font-family: var(--font-mono); font-size: 13px; color: var(--color-muted);
    border-left: 2px solid transparent; transition: background .2s, color .2s, border-color .2s; }
  .ob-folder:hover { color: var(--color-text); background: rgba(255,255,255,.03); }
  .ob-folder.is-active { color: #fff; background: color-mix(in srgb, var(--row-accent) 10%, transparent);
    border-left-color: var(--row-accent); }
  .ob-folder-ix { font-size: 10px; color: var(--row-accent); width: 18px; }
  .ob-folder-name { flex: 1; letter-spacing: .03em; }
  .ob-folder-count { font-size: 10px; color: var(--color-ghost); }
  .ob-sidebar-foot { display: flex; align-items: center; gap: 11px; padding: 14px 8px 4px;
    border-top: 1px solid var(--color-border); margin-top: 10px; }
  .ob-status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--color-muted); flex: none; }
  .ob-status-dot.on { background: var(--color-loop); box-shadow: 0 0 10px var(--color-loop);
    animation: ob-pulse 1.8s ease-in-out infinite; }
  .ob-status-lines { display: flex; flex-direction: column; }
  .ob-status-main { font-family: var(--font-mono); font-size: 10px; letter-spacing: .24em;
    text-transform: uppercase; color: var(--color-loop); }
  .ob-status-sub { font-family: var(--font-mono); font-size: 9.5px; color: var(--color-muted); margin-top: 3px; }

  /* ── Skill rail ────────────────────────────────────────────────────── */
  .ob-rail { display: flex; flex-direction: column; background: var(--color-surface);
    border-right: 1px solid var(--color-border); overflow: hidden; }
  .ob-rail-head { display: flex; align-items: baseline; justify-content: space-between;
    padding: 22px 18px 14px; }
  .ob-rail-title { font-family: var(--font-display); font-style: italic; font-weight: 700;
    text-transform: uppercase; letter-spacing: .03em; font-size: 1.3rem; color: #fff; }
  .ob-rail-count { font-family: var(--font-mono); font-size: 10px; letter-spacing: .2em;
    text-transform: uppercase; color: var(--color-accent-2); }
  .ob-rail-search { display: flex; align-items: center; margin: 0 16px 12px;
    border: 1px solid var(--color-border); background: var(--color-bg); }
  .ob-rail-search:focus-within { border-color: var(--color-accent-2); }
  .ob-rail-slash { padding: 0 10px; color: var(--color-accent-2); font-family: var(--font-mono); }
  .ob-rail-search input { flex: 1; background: none; border: 0; outline: none; color: var(--color-text);
    font-family: var(--font-mono); font-size: 12.5px; padding: 9px 8px 9px 0; }
  .ob-rail-search input::placeholder { color: var(--color-muted); }
  .ob-rail-cats { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 16px 12px; }
  .ob-cat { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: .16em; text-transform: uppercase;
    color: var(--color-muted); padding: 5px 9px; border: 1px solid var(--color-border-2); transition: .2s; }
  .ob-cat:hover { color: var(--color-text); }
  .ob-cat.is-active { color: var(--color-accent-2); border-color: color-mix(in srgb, var(--color-accent-2) 45%, transparent);
    background: color-mix(in srgb, var(--color-accent-2) 8%, transparent); }
  .ob-rail-list { flex: 1; overflow-y: auto; padding: 4px 10px 16px; display: flex; flex-direction: column; gap: 2px; }
  .ob-skill { display: grid; grid-template-columns: 1fr auto; grid-template-areas: "cmd cat" "desc cat";
    gap: 2px 8px; padding: 11px 12px; text-align: left; border: 1px solid transparent;
    transition: background .2s, border-color .2s; }
  .ob-skill:hover { background: rgba(255,255,255,.03); border-color: var(--color-border-2); }
  .ob-skill.is-active { background: color-mix(in srgb, var(--color-accent-2) 8%, transparent);
    border-color: color-mix(in srgb, var(--color-accent-2) 35%, transparent); }
  .ob-skill-cmd { grid-area: cmd; font-family: var(--font-mono); font-size: 13px; color: var(--color-text); letter-spacing: .02em; }
  .ob-skill.is-active .ob-skill-cmd { color: var(--color-accent-2); }
  .ob-skill-desc { grid-area: desc; font-family: var(--font-mono); font-size: 10.5px; color: var(--color-muted); line-height: 1.45; }
  .ob-skill-cat { grid-area: cat; align-self: center; font-family: var(--font-mono); font-size: 8px;
    letter-spacing: .2em; text-transform: uppercase; color: var(--color-ghost); }
  .ob-rail-empty { font-family: var(--font-mono); font-size: 12px; color: var(--color-muted); padding: 20px 12px; }

  /* ── Main: console + composer ──────────────────────────────────────── */
  .ob-main { display: flex; flex-direction: column; min-width: 0; background: var(--color-bg); }
  .ob-console { flex: 1; display: flex; flex-direction: column; min-height: 0;
    background: radial-gradient(120% 70% at 72% -8%,
      color-mix(in srgb, var(--color-accent-2) 8%, transparent) 0%, transparent 56%); }
  .ob-console-head { padding: 30px clamp(20px,3vw,40px) 18px; border-bottom: 1px solid var(--color-border); }
  .ob-pill { display: inline-flex; align-items: center; gap: 10px; padding: 7px 13px; font-family: var(--font-mono);
    font-size: 10px; letter-spacing: .4em; text-transform: uppercase; color: var(--color-accent-2);
    background: color-mix(in srgb, var(--color-accent-2) 4%, transparent);
    border: 1px solid color-mix(in srgb, var(--color-accent-2) 30%, transparent); position: relative; }
  .ob-pill::before, .ob-pill::after { content:''; position:absolute; width:7px; height:7px; border:1px solid currentColor; }
  .ob-pill::before { top:-2px; left:-2px; border-right:0; border-bottom:0; }
  .ob-pill::after { bottom:-2px; right:-2px; border-left:0; border-top:0; }
  .ob-pill-dot { width:6px; height:6px; border-radius:50%; background: currentColor; box-shadow: var(--glow-sm);
    animation: ob-pulse 1.5s ease-in-out infinite; }
  .ob-console-h1 { font-family: var(--font-display); font-style: italic; font-weight: 700; text-transform: uppercase;
    letter-spacing: -.02em; line-height: .95; font-size: clamp(2rem, 4vw, 3.2rem); color: #fff; margin: 16px 0 0; }
  .ob-h1-stroke { color: transparent; -webkit-text-stroke: 1.5px var(--color-accent-2);
    text-shadow: 0 0 44px color-mix(in srgb, var(--color-accent-2) 35%, transparent); }
  .ob-console-sub { font-family: var(--font-mono); font-size: 12.5px; line-height: 1.65; color: var(--color-faint);
    max-width: 60ch; margin: 14px 0 0; }

  .ob-stream { flex: 1; overflow-y: auto; padding: 18px clamp(20px,3vw,40px) 26px; display: flex; flex-direction: column; gap: 4px; }

  /* LogEntry */
  .ob-log { display: grid; grid-template-columns: 64px 1fr; gap: 14px; padding: 13px 0;
    border-bottom: 1px solid var(--color-border-2); }
  .ob-log-gutter { display: flex; flex-direction: column; align-items: center; gap: 6px; padding-top: 3px; }
  .ob-log-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--log-accent); box-shadow: 0 0 8px var(--log-accent); }
  .ob-log-time { font-family: var(--font-mono); font-size: 9.5px; color: var(--color-ghost); }
  .ob-log-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .ob-log-actor { font-family: var(--font-mono); font-size: 12px; color: var(--log-accent); letter-spacing: .04em; }
  .ob-log-cmd { color: var(--color-accent-2); }
  .ob-log-role { font-family: var(--font-mono); font-size: 8px; letter-spacing: .28em; text-transform: uppercase; color: var(--color-ghost); }
  .ob-log-text { font-family: var(--font-mono); font-size: 12.5px; line-height: 1.6; color: var(--color-text); margin: 7px 0 0; }
  .ob-log-command .ob-log-text { color: var(--color-faint); }
  .ob-log-tags { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 9px; }
  .ob-log-tag { font-family: var(--font-mono); font-size: 10px; color: var(--color-accent-2);
    background: rgba(0,243,255,.07); border: 1px solid var(--color-border-2); padding: 2px 7px; border-radius: 2px; }

  /* CommandBar */
  .ob-composer { display: flex; align-items: stretch; gap: 0; margin: 0 clamp(20px,3vw,40px) 22px;
    border: 1px solid var(--color-border); background: var(--color-surface); }
  .ob-composer:focus-within { border-color: var(--color-accent-2); box-shadow: 0 0 22px color-mix(in srgb, var(--color-accent-2) 18%, transparent); }
  .ob-composer-slash { display: flex; align-items: center; padding: 0 15px; font-family: var(--font-mono);
    font-size: 16px; color: var(--color-accent-2); border-right: 1px solid var(--color-border); }
  .ob-composer-input { flex: 1; min-width: 0; background: none; border: 0; outline: none; color: var(--color-text);
    font-family: var(--font-mono); font-size: 13.5px; padding: 15px 12px; }
  .ob-composer-input::placeholder { color: var(--color-muted); }
  .ob-composer-hint { display: flex; align-items: center; padding: 0 12px; font-family: var(--font-mono);
    font-size: 9.5px; letter-spacing: .2em; text-transform: uppercase; color: var(--color-ghost); }
  .ob-composer-send { clip-path: var(--clip-tech); background: var(--grad-button); padding: 1.5px; margin: 6px; transition: box-shadow .2s; }
  .ob-composer-send:hover { box-shadow: var(--glow-cta); }
  .ob-composer-send-in { display: block; clip-path: var(--clip-tech); background: var(--color-bg); color: #fff;
    font-family: var(--font-display); font-style: italic; font-weight: 700; text-transform: uppercase; letter-spacing: .05em;
    padding: 9px 20px; font-size: .78rem; transition: background .2s, color .2s; }
  .ob-composer-send:hover .ob-composer-send-in { background: #fff; color: #0a0a12; }

  @keyframes ob-pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  @media (prefers-reduced-motion: reduce) { .ob-pill-dot, .ob-status-dot.on { animation: none; } }

  /* Responsive: drop the skill rail < 1080px, stack sidebar narrower. */
  @media (max-width: 1080px) {
    .ob-shell { grid-template-columns: 220px 1fr; }
    .ob-rail { display: none; }
  }
  @media (max-width: 720px) {
    .ob-shell { grid-template-columns: 1fr; }
    .ob-sidebar { display: none; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <!-- Role components — App is loaded last so it can read the others off window -->
  <script type="text/babel" src="components/Sidebar.jsx"></script>
  <script type="text/babel" src="components/AssistantsList.jsx"></script>
  <script type="text/babel" src="components/MessageBubble.jsx"></script>
  <script type="text/babel" src="components/ChatArea.jsx"></script>
  <script type="text/babel" src="components/InputBar.jsx"></script>
  <script type="text/babel" src="components/App.jsx"></script>

  <script type="text/babel">
    const { App } = window;
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <!-- Shared back-to-index affordance (../../ depth from ui_kits/app/) -->
  <script src="../../preview/_home.js" data-home="../../index.html"></script>
</body>
</html>
